name: ETF-Hunter Auto Pilot

on:
  schedule:
    # KST(한국 시간) 매일 아침 09:00 정각 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # GitHub Actions에서 Git Push를 하기 위한 권한 설정
    permissions:
      contents: write

    steps:
      - name: 저장소 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 3.10 환경 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필수 퀀트 라이브러리 자동 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ETF Hunter 퀀트 코어 엔진 가동
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python etf.py

      - name: 결과물 깃허브에 자동 기록
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 파일이 생성된 폴더들만 명시적으로 추가
          git add Daily/*.md ETF/*.md Journal/*.md Backtest/*.md || echo "추가할 파일 없음"
          
          # 변경 사항이 있을 때만 커밋
          git commit -m "[Auto Pilot] 자동 업데이트" || echo "변경 사항 없음"
          
          # 원격 저장소로 푸시
          git push
