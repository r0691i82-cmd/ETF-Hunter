name: ETF-Hunter Auto Pilot

on:
  schedule:
    # KST(한국 시간) 매일 아침 09:00 정각에 자동으로 가동 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 필요한 경우 깃허브 웹사이트에서 수동으로 [Run workflow]를 누를 수 있도록 허용

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 코드 체크아웃
        uses: actions/checkout@v3

      - name: 파이썬 3.10 환경 세팅
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필수 퀀트 라이브러리 자동 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ETF Hunter 퀀트 코어 엔진 가동
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python etf.py

      - name: 옵시디언 Dataview 마크다운 결과물 깃허브에 자동 기록
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add vault/ 01_Daily/ 04_ETF/ 07_Journal/ 08_Backtest/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 [Auto Pilot] 금일 시장 국면 분석 및 Dataview 마크다운 DB 갱신 (${{ github.run_number }})" && git push)
